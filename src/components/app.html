<!-- ========== BORA APP ========== -->
<section id="app" class="bg-bora-green py-20 md:py-28 overflow-hidden">
  <div class="container-site">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16 items-center">

      <!-- Text Column -->
      <div class="order-2 lg:order-1">
        <p class="font-heading text-xs font-semibold uppercase tracking-widest text-bora-dark/60 mb-4">Nosso Aplicativo</p>
        <h2 class="heading-section text-bora-dark text-3xl sm:text-4xl lg:text-5xl mb-4">
          Conheça a interface<br />do BORA APP
        </h2>
        <p class="text-bora-dark/75 text-base leading-relaxed mb-8 max-w-md">
          Baixe agora e confira o nosso app! Acompanhe campeonatos, estatísticas de jogadores,
          classificações e muito mais na palma da sua mão.
        </p>

        <!-- Store Badges -->
        <div class="flex flex-wrap gap-3">

          <!-- App Store -->
          <a href="#"
             target="_blank" rel="noopener noreferrer"
             class="store-badge"
             aria-label="Baixar na App Store">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 flex-shrink-0">

              <p class="text-white font-semibold text-sm leading-none">App Store</p>
            </div>
          </a>

          <!-- Google Play -->
          <a href="#"
             target="_blank" rel="noopener noreferrer"
             class="store-badge"
             aria-label="Baixar no Google Play">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 flex-shrink-0">

              <p class="text-white font-semibold text-sm leading-none">Google Play</p>
            </div>
          </a>

        </div>
      </div>

      <!-- App Mockup Column -->
      <div class="order-1 lg:order-2 flex justify-center lg:justify-end">
        <div class="relative">
          <img src="./assets/images/image_interface-bora-app.png"
               alt="BORA App — interface de jogador e seleção de rodada"
               class="w-72 sm:w-80 lg:w-[420px] drop-shadow-2xl" />

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-bora-dark">
